name: Java CI Pipeline

on:
  push:
    branches: [ "newlocal" ]
  pull_request:
    branches: [ "newlocal" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package

      - name: Run Application
        run: java -cp target/hello-java-1.0-SNAPSHOT.jar HelloWorld
